alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
features:
- buildpack-stack=ubuntu-22
name: my-portfolio
region: sgp
ingress:
  rules:
  - component:
      name: chatbot
    match:
      path:
        prefix: /chatbot
  - component:
      name: my-portfolio
    match:
      path:
        prefix: /
services:
- build_command: npm run build
  run_command: npm start
  environment_slug: node-js
  http_port: 8080
  envs:
  - key: NPM_CONFIG_PRODUCTION
    scope: BUILD_TIME
    type: GENERAL
    value: "false"
  github:
    branch: main
    deploy_on_push: true
    repo: MangChhunleang/my-portfolio
  name: my-portfolio
  source_dir: /
functions:
- envs:
  - key: GEMINI_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  github:
    branch: main
    deploy_on_push: true
    repo: MangChhunleang/my-portfolio
  name: chatbot
  source_dir: /
