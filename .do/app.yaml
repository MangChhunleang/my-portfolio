alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
features:
- buildpack-stack=ubuntu-22
name: my-portfolio
region: sgp
ingress:
  rules:
  - component:
      name: my-portfolio
    match:
      authority: {}
      path:
        prefix: /
  - component:
      name: chatbot
    match:
      authority: {}
      path:
        prefix: /chatbot
static_sites:
- build_command: npm run build
  environment_slug: node-js
  envs:
  - key: NPM_CONFIG_PRODUCTION
    scope: BUILD_TIME
    type: GENERAL
    value: "false"
  github:
    branch: main
    deploy_on_push: true
    repo: MangChhunleang/my-portfolio
  name: my-portfolio
  output_dir: dist
  source_dir: /
functions:
- envs:
  - key: GEMINI_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  github:
    branch: main
    deploy_on_push: true
    repo: MangChhunleang/my-portfolio
  name: chatbot
  source_dir: /packages
