# This project.yml configures DigitalOcean App Platform to recognize your serverless functions
parameters: {}
environment: {}
packages:
  - name: chatbot
    environment: {}
    parameters: {}
    annotations: {}
    functions:
      - name: chat
        binary: false
        main: ""
        runtime: "nodejs:18"
        web: true
        parameters: {}
        environment:
          GEMINI_API_KEY: "${GEMINI_API_KEY}"
